  <title>Sidebar + Logo + Submenu with Image Cards</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      background: #2c3e50;
      color: white;
      display: flex;
      flex-direction: column;
	  font-size: 28px;
    }

    .logo {
      padding: 20px;
      font-size: 32px;
      font-weight: bold;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      background: #1a252f;
    }

    .tab {
      padding: 15px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .tab:hover { background: #34495e; }
    .tab.active { background: #1abc9c; }

    /* Main */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* Submenu */
    .submenu {
      background: #ecf0f1;
      padding: 15px;
      display: flex;
      gap: 10px;
      border-bottom: 1px solid #ccc;
    }

    .submenu button {
      padding: 8px 12px;
      border: none;
      background: #bdc3c7;
      cursor: pointer;
      border-radius: 4px;
	  font-size: 28px;
	  border-radius: 12px;
    }

    .submenu button.active {
      background: #3498db;
      color: white;
    }

    /* Content Grid */
    .content {
      padding: 15px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
      text-align: center;
      background: #fff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }

    .card p {
      margin: 10px;
      font-size: 28px;
    }
  </style>
</head>

function selectTab(evt, tabName) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  evt.currentTarget.classList.add('active');

  const submenu = document.getElementById('submenu');
  submenu.innerHTML='';

  data[tabName].submenu.forEach((item,i)=>{
    const btn=document.createElement('button');
    btn.textContent=item;
    btn.onclick=()=>selectSubmenu(tabName,item,btn);
    if(i===0) btn.classList.add('active');
    submenu.appendChild(btn);
  });

  loadContent(tabName, data[tabName].submenu[0]);
}

function selectSubmenu(tabName,item,btn){
  document.querySelectorAll('.submenu button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  loadContent(tabName,item);
}

function loadContent(tabName,item){
  const contentDiv=document.getElementById('content');
  contentDiv.innerHTML='';

  data[tabName].content[item].forEach(card=>{
    const div=document.createElement('div');
    div.className='card';
    div.innerHTML=`<img src="${card.img}" alt=""><p>${card.text}</p>`;
    contentDiv.appendChild(div);
  });
}
